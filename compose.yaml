services:
  codex:
    image: ghcr.io/minjue2017/codex-dev-base:latest
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      # Your projects live here. Codex can only see what you mount.
      - ./workspace:/workspace

      # Persistent Codex login state. Never bake this into the image.
      - codex-home:/home/dev/.codex

      # Persistent runtime/tool/cache state.
      - mise-data:/home/dev/.local/share/mise
      - mise-config:/home/dev/.config/mise
      - dev-cache:/home/dev/.cache
      - git-config:/home/dev/.config/git

      # Optional npm/pnpm/pip/go/cargo caches. They are harmless even if unused.
      - npm-cache:/home/dev/.npm
      - pnpm-store:/home/dev/.local/share/pnpm
      - pip-cache:/home/dev/.cache/pip
      - go-cache:/home/dev/go
      - cargo-cache:/home/dev/.cargo
      - rustup-cache:/home/dev/.rustup

    environment:
      - CODEX_HOME=/home/dev/.codex
      - MISE_DATA_DIR=/home/dev/.local/share/mise
      - MISE_CONFIG_DIR=/home/dev/.config/mise

    command: bash

volumes:
  codex-home:
  mise-data:
  mise-config:
  dev-cache:
  git-config:
  npm-cache:
  pnpm-store:
  pip-cache:
  go-cache:
  cargo-cache:
  rustup-cache:
