name: 构建 Codex 通用运行镜像

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    # 每天 UTC 03:00 自动重建，保持 Codex CLI 和系统包相对新鲜。
    - cron: "0 3 * * *"

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASENAME: codex-dev-base

jobs:
  build-base:
    name: 构建并发布基础镜像
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v7

      - name: 配置 QEMU 多架构支持
        uses: docker/setup-qemu-action@v4

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/${IMAGE_BASENAME}"
          DATE_TAG="$(date -u +"%Y%m%d")"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

          {
            echo "image_tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${DATE_TAG}"
            echo "${IMAGE_NAME}:${SHORT_SHA}"

            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"

              # 例如 v0.1.0 同时发布 0.1.0，方便两种使用习惯。
              if [[ "${GITHUB_REF_NAME}" == v* ]]; then
                echo "${IMAGE_NAME}:${GITHUB_REF_NAME#v}"
              fi
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 构建并推送基础镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: base/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.image_tags }}
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=codex-dev-base
            org.opencontainers.image.description=Codex 通用 Docker 运行底座。项目依赖由 Codex 后续在容器内按需安装。
          cache-from: type=gha
          cache-to: type=gha,mode=max
