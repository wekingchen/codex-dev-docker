# Portainer Standalone Docker Stack 模板。
# 部署前请先阅读 docs/PORTAINER.md，并创建所有 bind mount 源路径。
services:
  codex-ssh-hostkey-init:
    container_name: codex-ssh-hostkey-init
    image: ghcr.io/wekingchen/codex-dev-remote:latest
    pull_policy: always
    entrypoint:
      - /usr/local/bin/remote-hostkey-init.sh
    network_mode: none
    restart: "no"
    volumes:
      - type: bind
        source: /root/codex/ssh-hostkeys
        target: /etc/ssh/codex-host-keys
        bind:
          create_host_path: false
    cap_drop:
      - NET_BIND_SERVICE
      - NET_RAW

  codex-ssh:
    container_name: codex-ssh
    image: ghcr.io/wekingchen/codex-dev-remote:latest
    pull_policy: always
    depends_on:
      codex-ssh-hostkey-init:
        condition: service_completed_successfully
    working_dir: /workspace
    init: true
    restart: unless-stopped
    pids_limit: 256
    stop_grace_period: 20s
    ports:
      # 必须保留 127.0.0.1；远程客户端通过宿主机 SSH Tunnel 进入。
      - "127.0.0.1:2222:2222"
    volumes:
      - type: bind
        source: /root/codex/workspace
        target: /workspace
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/dev-home
        target: /home/dev
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/ssh-hostkeys
        target: /etc/ssh/codex-host-keys
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/ssh/authorized_keys
        target: /etc/codex-ssh/authorized_keys.input
        read_only: true
        bind:
          create_host_path: false
    environment:
      CODEX_HOME: /home/dev/.codex
      MISE_DATA_DIR: /home/dev/.local/share/mise
      MISE_CONFIG_DIR: /home/dev/.config/mise
      # 必须与宿主机 workspace 和 dev-home 的实际所有者一致，禁止使用 0。
      HOST_UID: "1000"
      HOST_GID: "1000"
    tmpfs:
      - /run:rw,nosuid,nodev,size=16m,mode=0755
      - /tmp:rw,nosuid,nodev,size=256m,mode=1777
    cap_drop:
      - NET_BIND_SERVICE
      - NET_RAW
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z 127.0.0.1 2222
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - codex-remote

networks:
  codex-remote:
    driver: bridge
