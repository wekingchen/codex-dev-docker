# Portainer Standalone personal Stack：Codex + Claude Code + 可选Xray + SSH。
# 部署前须同时阅读 docs/PORTAINER.md 与 docs/PERSONAL-DUAL-CLI.md。
# 全部bind mount均为create_host_path:false；workspace、home、SSH、host key及Xray源必须预先存在。
# Portainer root Console通常是非login shell，不自动加载动态代理环境；CLI真实验证请通过SSH dev会话。
services:
  codex-ssh-hostkey-init:
    container_name: codex-ssh-hostkey-init
    image: ghcr.io/wekingchen/codex-dev-personal-remote:latest
    pull_policy: always
    entrypoint:
      - /usr/local/bin/remote-hostkey-init.sh
    network_mode: none
    restart: "no"
    healthcheck:
      disable: true
    volumes:
      - type: bind
        source: /root/codex/ssh-hostkeys
        target: /etc/ssh/codex-host-keys
        bind:
          create_host_path: false
    cap_drop:
      - NET_BIND_SERVICE
      - NET_RAW

  codex-ssh:
    container_name: codex-ssh
    image: ghcr.io/wekingchen/codex-dev-personal-remote:latest
    pull_policy: always
    depends_on:
      codex-ssh-hostkey-init:
        condition: service_completed_successfully
    working_dir: /workspace
    init: true
    restart: unless-stopped
    pids_limit: 256
    stop_grace_period: 20s
    ports:
      # 必须保留127.0.0.1；10809只在容器loopback监听，绝不发布到宿主机。
      - "127.0.0.1:2222:2222"
    volumes:
      - type: bind
        source: /root/codex/workspace
        target: /workspace
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/dev-home
        target: /home/dev
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/ssh-hostkeys
        target: /etc/ssh/codex-host-keys
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /root/codex/ssh/authorized_keys
        target: /etc/codex-ssh/authorized_keys.input
        read_only: true
        bind:
          create_host_path: false
      # 即使XRAY_PROXY_ENABLED=false，Docker仍要求此源文件存在；关闭模式只是不验证其内容。
      - type: bind
        source: /root/codex/xray/config.json
        target: /etc/xray/config.json
        read_only: true
        bind:
          create_host_path: false
    environment:
      CODEX_HOME: /home/dev/.codex
      MISE_DATA_DIR: /home/dev/.local/share/mise
      MISE_CONFIG_DIR: /home/dev/.config/mise
      # true：启动Xray；all-proxy禁止freedom，未被其他非直连规则处理的流量使用首个非直连outbound，额外路由仍需审计。
      # 严格cn-direct为私网阻断、中国域名/IP直连、其他未匹配流量代理。
      # false：不启动Xray且CLI直接联网，但上面的config.json bind源仍必须存在。
      # 两种模式切换都必须Update整个Stack/Recreate，Restart不会应用新的environment。
      XRAY_PROXY_ENABLED: "true"
      # 必须与宿主机workspace和dev-home的实际所有者一致，禁止使用0或65532。
      HOST_UID: "1000"
      HOST_GID: "1000"
    tmpfs:
      - /run:rw,nosuid,nodev,size=16m,mode=0755
      - /tmp:rw,nosuid,nodev,size=256m,mode=1777
    cap_drop:
      - NET_BIND_SERVICE
      - NET_RAW
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/personal-remote-healthcheck.sh
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - codex-remote

networks:
  codex-remote:
    driver: bridge
